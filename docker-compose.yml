services:
  racadm:
    image: racadm-jenkins:latest
    container_name: racadm-jenkins
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IDRAC_TARBALL: "${IDRAC_TARBALL}"
    command: ["racadm", "--nocertwarn", "-r", "${IDRAC_IP}", "-u", "${IDRAC_USER}", "-p", "${IDRAC_PASS}"]
    network_mode: host
    restart: "no"

# Usage: docker compose run --rm racadm <command>
# Example: docker compose run --rm racadm getsysinfo
